name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: go run ./cmd/demo
      - run: bash -n scripts/smoke-test.sh scripts/routing-smoke-test.sh scripts/demo.sh scripts/live-learning-test.sh
