server:
  addr: "127.0.0.1:8080"
  max_body_bytes: 1048576
  read_timeout: "5s"
  write_timeout: "30s"
  idle_timeout: "2m"
  shutdown_timeout: "10s"
openai:
  api_key_env: "OPENAI_API_KEY"
backends:
  - id: "cheap"
    model: "your-cheap-model-id"
    max_completion_tokens: 512
  - id: "strong"
    model: "your-strong-model-id"
    max_completion_tokens: 512
pricing:
  models:
    your-cheap-model-id:
      input_cost_per_token: 0.0000002
      output_cost_per_token: 0.0000008
    your-strong-model-id:
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000003
router:
  type: "cost_aware"
budgets:
  latency_budget_ms: 1600
  cost_budget_usd: 0.02
  max_completion_tokens: 512
  temperature: 0.2
