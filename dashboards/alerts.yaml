# Example Prometheus alert rules for Augur.
# These are a starting point. Tune the thresholds and windows to your traffic.
groups:
  - name: augur
    rules:
      - alert: AugurHighErrorRate
        expr: sum(rate(augur_errors_total[5m])) / clamp_min(sum(rate(augur_requests_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Augur error rate is high"
          description: "More than 5 percent of requests have failed for 10 minutes."

      - alert: AugurHighLatencyP95
        expr: histogram_quantile(0.95, sum by (le) (rate(augur_latency_ms_bucket[5m]))) > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Augur p95 latency is high"
          description: "The 95th percentile latency has been over 5000 ms for 10 minutes."

      - alert: AugurNoTraffic
        expr: sum(rate(augur_requests_total[5m])) == 0
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Augur is serving no traffic"
          description: "No requests have been served for 15 minutes. This may be expected off-hours."

      - alert: AugurInstanceDown
        expr: up{job="augur"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Augur instance is down"
          description: "Prometheus cannot scrape the Augur target. Check the process and the scrape config."
