name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: go run ./cmd/demo
      - run: go run ./cmd/augur validate --config configs/request-aware.example.yaml
      - run: go run ./cmd/augur explain --config configs/request-aware.example.yaml --prompt "Say hello." --type chat
      - run: bash -n scripts/smoke-test.sh scripts/routing-smoke-test.sh scripts/demo.sh scripts/live-learning-test.sh
